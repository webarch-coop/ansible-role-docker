---
argument_specs:
  main:
    author: Chris Croome
    description: Ansible Role to install Docker CE on Debian and Ubuntu.
    short_description: The main entry point for the Docker role.
    options:
      docker:
        type: bool
        required: true
        description: Run the tasks in this role.
      docker_daemon:
        type: dict
        required: false
        description: Docker daemon configuration, YAML that will converted to JSON and written to /etc/docker/daemon.json.
      docker_compose_v1:
        type: bool
        required: false
        description: Set to false for Docker Composer version 1 to be removed and set to true for docker-compose version 1 and docker-compose-switch to be installed.
      docker_compose_version_v1:
        type: str
        required: true
        description: The version number of docker-compose version 1 to be installed when docker_compose_v1 is defined and true.
      docker_gpg_checksum:
        type: str
        required: true
        description: The SHA256 checksum of the Docker GPG public key.
      docker_gpg_fingerprints:
        type: list
        elements: str
        required: true
        description: A list of the Docker GPG public fingerprints.
      docker_gpg_url:
        type: str
        required: true
        description: URL for the Docker apt repo GPG public key.
      docker_pkg:
        type: list
        required: true
        description: Packages to be installed from the Docker apt repo.
      docker_repo_pkg:
        type: list
        elements: str
        description: A list of packages available from the Docker repo for apt pinning.
      docker_systemd_units:
        type: list
        required: false
        description: A list of systemd units and contents.
        elements: dict
        options:
          files:
            type: list
            required: false
            description: A list of systemd unit files and their content.
            elements: dict
            options:
              comment:
                type: str
                required: false
                description: A comment to be included at the top of the systemd unit file.
              conf:
                type: dict
                required: false
                description: A dictionary of the values for the systemd unit file.
              path:
                type: str
                required: true
                description: The path of the systemd unit file.
              state:
                type: str
                required: false
                description: The state of the systemd unit file.
                choices:
                  - absent
                  - edited
                  - masked
                  - present
                  - templated
          name:
            type: str
            required: true
            description: The name of the systemd service.
          pkgs:
            type: list
            required: false
            description: A list of packages that should be present.
          state:
            type: str
            required: false
            description: The state of the systemd unit.
            choices:
              - absent
              - enabled
              - ignore
              - reboot
              - stopped
          verify:
            type: str
            required: false
            description: The name of the service to verify using systemd-analyze.
      docker_verify:
        type: bool
        required: true
        description: Check all variables that start with docker_ against the argument spec.
...
