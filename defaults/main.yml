---
docker: false
docker_compose_v1: false
docker_compose_version_v1: "1.29.2"
docker_daemon:
#   dns:
#     - 1.1.1.1
#     - 1.1.2.2
#     - 8.8.8.8
#     - 9.9.9.9
#   storage-driver: overlay2
#   log-driver: syslog
  # Use NFTables
  firewall-backend: nftables
#   # Mailcow Docker Settings:
#   ipv6: true
#   fixed-cidr-v6: fd00:dead:beef:c0::/80
#   experimental: true
#   ip6tables: true
docker_pkg:
  - containerd.io
  - docker-ce
  - docker-ce-cli
  - docker-ce-rootless-extras
  - docker-compose-plugin
  # - docker-scan-plugin
  - python3-debian
# The default /usr/lib/systemd/system/docker.service doesn't include nftables.service
docker_systemd_units:
  - name: docker
    state: enabled
    files:
      - path: /etc/systemd/system/docker.service.d/override.conf
        conf:
          Unit:
            After: network-online.target nss-lookup.target docker.socket firewalld.service nftables.service containerd.service time-set.target
            Wants: network-online.target nftables.service containerd.service
docker_verify: true
...
